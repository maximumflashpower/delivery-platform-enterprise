services:
  app-dev:
    build:
      context: .
      target: builder
    container_name: delivery-platform-dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - dev-db:/app/data
    environment:
      - NODE_ENV=development
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/dev.db
    command: node --require ./prepolyfill.js ./node_modules/.bin/nest start --watch
    restart: unless-stopped

  app-prod:
    build: .
    container_name: delivery-platform-prod
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=${DB_DATABASE:-delivery_platform}
      - JWT_SECRET=${JWT_SECRET:-change-me}
    restart: unless-stopped
    profiles:
      - prod

  postgres:
    image: postgres:14-alpine
    container_name: delivery-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${DB_DATABASE:-delivery_platform}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - prod

volumes:
  dev-db:
  pg-data:
