version: '3.8'

services:
  app:
    build:
      context: .
      target: production
    container_name: delivery-platform
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/prod.db
      - THROTTLER_TTL=60000
      - THROTTLER_LIMIT=100
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  app-dev:
    build:
      context: .
      target: builder
    container_name: delivery-platform-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_PATH=./dev.db
      - THROTTLER_TTL=60000
      - THROTTLER_LIMIT=100
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    profiles: ["dev"]

volumes:
  app-data:
