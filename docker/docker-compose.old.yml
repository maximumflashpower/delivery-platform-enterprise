version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumo-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lumo_secure_pass_2026}
      POSTGRES_DB: ${DB_DATABASE:-bankchat_core}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform-network

  redis:
    image: redis:7-alpine
    container_name: lumo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - platform-network

volumes:
  postgres_data:
  redis_data:

networks:
  platform-network:
    driver: bridge
